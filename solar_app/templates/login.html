<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SolarML — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root[data-theme="light"]{
  --bg:linear-gradient(135deg,#fef9f0 0%,#fff8f3 40%,#f0f4ff 100%);
  --card:#ffffff;
  --border:#e8edf5;
  --text:#0f172a;
  --sub:#64748b;
  --muted:#94a3b8;
  --input-bg:#f8fafc;
  --input-border:#dde3ef;
  --input-focus:#f59e0b;
  --shadow:0 32px 80px rgba(15,23,42,0.10),0 8px 24px rgba(15,23,42,0.06);
  --btn-text:#ffffff;
  --panel-bg:linear-gradient(145deg,#1e293b 0%,#0f172a 60%,#162033 100%);
  --accent:#f59e0b;
}
:root[data-theme="dark"]{
  --bg:linear-gradient(135deg,#060d1f 0%,#0a1628 50%,#0d1f36 100%);
  --card:#111927;
  --border:#1e2d42;
  --text:#f1f5f9;
  --sub:#94a3b8;
  --muted:#475569;
  --input-bg:#0d1826;
  --input-border:#1e2d42;
  --input-focus:#f59e0b;
  --shadow:0 32px 80px rgba(0,0,0,0.5),0 8px 24px rgba(0,0,0,0.3);
  --btn-text:#000000;
  --panel-bg:linear-gradient(145deg,#f59e0b 0%,#fb923c 100%);
  --accent:#f59e0b;
}

html,body{height:100%;font-family:'Plus Jakarta Sans',sans-serif;}

body{
  min-height:100vh;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  padding:24px;
  transition:background 0.35s;
  position:relative;overflow:hidden;
}

/* decorative orbs */
body::before{
  content:'';position:fixed;
  width:500px;height:500px;border-radius:50%;
  background:radial-gradient(circle,rgba(245,158,11,0.12) 0%,transparent 70%);
  top:-120px;right:-80px;pointer-events:none;
  animation:pulse 6s ease-in-out infinite;
}
body::after{
  content:'';position:fixed;
  width:400px;height:400px;border-radius:50%;
  background:radial-gradient(circle,rgba(99,102,241,0.08) 0%,transparent 70%);
  bottom:-100px;left:-60px;pointer-events:none;
  animation:pulse 8s ease-in-out infinite reverse;
}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.12);}}

/* theme toggle */
.theme-toggle{
  position:fixed;top:20px;right:20px;z-index:100;
  background:var(--card);border:1px solid var(--border);
  border-radius:50px;padding:6px 14px;
  display:flex;align-items:center;gap:8px;cursor:pointer;
  font-size:12px;font-weight:600;color:var(--sub);
  box-shadow:0 2px 12px rgba(0,0,0,0.08);
  transition:all 0.2s;
}
.theme-toggle:hover{border-color:var(--accent);color:var(--accent);}
.toggle-icon{font-size:16px;transition:transform 0.4s;}

/* card */
.login-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:28px;
  box-shadow:var(--shadow);
  width:100%;max-width:440px;
  overflow:hidden;
  animation:slideUp 0.5s cubic-bezier(0.16,1,0.3,1);
  position:relative;z-index:1;
}
@keyframes slideUp{from{opacity:0;transform:translateY(32px);}to{opacity:1;transform:translateY(0);}}

/* top panel */
.panel{
  background:var(--panel-bg);
  padding:36px 40px 32px;
  position:relative;overflow:hidden;
}
[data-theme="light"] .panel::before{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='30' cy='30' r='1' fill='rgba(255,255,255,0.08)'/%3E%3C/svg%3E");
}
[data-theme="dark"] .panel::before{display:none;}

.sun-icon{
  width:56px;height:56px;
  background:rgba(255,255,255,0.15);
  border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;margin-bottom:16px;
  backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.2);
}
[data-theme="dark"] .sun-icon{
  background:rgba(0,0,0,0.2);
  border-color:rgba(255,255,255,0.15);
}
.panel-title{
  font-size:24px;font-weight:800;
  color:#ffffff;letter-spacing:-0.5px;
  margin-bottom:6px;
}
[data-theme="dark"] .panel-title{color:#000000;}
.panel-sub{font-size:13px;color:rgba(255,255,255,0.65);}
[data-theme="dark"] .panel-sub{color:rgba(0,0,0,0.6);}

/* form */
.form-body{padding:32px 40px 36px;}

.field{margin-bottom:20px;}
.field label{
  display:block;font-size:12px;font-weight:700;
  color:var(--sub);text-transform:uppercase;
  letter-spacing:0.8px;margin-bottom:8px;
}
.input-wrap{position:relative;}
.input-wrap .icon{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  font-size:16px;pointer-events:none;
}
.input-wrap input{
  width:100%;background:var(--input-bg);
  border:1.5px solid var(--input-border);
  border-radius:12px;padding:13px 14px 13px 42px;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;
  color:var(--text);transition:all 0.2s;
}
.input-wrap input:focus{
  outline:none;border-color:var(--input-focus);
  box-shadow:0 0 0 3px rgba(245,158,11,0.12);
  background:var(--card);
}
.input-wrap input::placeholder{color:var(--muted);}

.btn-login{
  width:100%;padding:15px;
  background:linear-gradient(135deg,#f59e0b,#fb923c);
  color:#000000;font-family:'Plus Jakarta Sans',sans-serif;
  font-size:15px;font-weight:800;
  border:none;border-radius:14px;cursor:pointer;
  transition:all 0.25s;
  box-shadow:0 4px 20px rgba(245,158,11,0.3);
  position:relative;overflow:hidden;
  letter-spacing:0.2px;
  margin-top:8px;
}
.btn-login::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.2),transparent);
  opacity:0;transition:opacity 0.2s;
}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(245,158,11,0.4);}
.btn-login:hover::after{opacity:1;}
.btn-login:active{transform:translateY(0);}
.btn-login:disabled{opacity:0.6;cursor:not-allowed;transform:none;}

.error-msg{
  background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);
  border-radius:10px;padding:10px 14px;
  font-size:13px;color:#ef4444;margin-bottom:16px;
  display:none;
}
.error-msg.show{display:block;}

.demo-creds{
  margin-top:24px;
  background:var(--input-bg);border:1px solid var(--border);
  border-radius:12px;padding:14px 16px;
}
.demo-title{font-size:11px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;}
.demo-row{
  display:flex;justify-content:space-between;
  font-family:'JetBrains Mono',monospace;font-size:12px;
  color:var(--sub);padding:3px 0;
}
.demo-row span:last-child{color:var(--accent);}

/* spinner */
.spinner{
  display:inline-block;width:18px;height:18px;
  border:2px solid rgba(0,0,0,0.2);border-top-color:#000;
  border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()">
  <span class="toggle-icon" id="themeIcon">🌙</span>
  <span id="themeLabel">Dark</span>
</button>

<div class="login-card">
  <div class="panel">
    <div class="sun-icon">☀️</div>
    <div class="panel-title">SolarML</div>
    <div class="panel-sub">Solar Energy Prediction Platform — sign in to continue</div>
  </div>

  <div class="form-body">
    <div class="error-msg" id="errMsg"></div>

    <div class="field">
      <label>Username</label>
      <div class="input-wrap">
        <span class="icon">👤</span>
        <input type="text" id="username" placeholder="Enter your username" autocomplete="username"/>
      </div>
    </div>

    <div class="field">
      <label>Password</label>
      <div class="input-wrap">
        <span class="icon">🔒</span>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"/>
      </div>
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      Sign In →
    </button>

    <div class="demo-creds">
      <div class="demo-title">Demo Credentials</div>
      <div class="demo-row"><span>Username</span><span>demo</span></div>
      <div class="demo-row"><span>Password</span><span>demo</span></div>
    </div>
  </div>
</div>

<script>
// Theme (default: light)
const saved = localStorage.getItem("solarml_theme") || "light";
document.documentElement.setAttribute("data-theme", saved);
updateThemeUI(saved);

function toggleTheme(){
  const cur = document.documentElement.getAttribute("data-theme");
  const next = cur === "light" ? "dark" : "light";
  document.documentElement.setAttribute("data-theme", next);
  localStorage.setItem("solarml_theme", next);
  updateThemeUI(next);
}
function updateThemeUI(t){
  document.getElementById("themeIcon").textContent = t === "dark" ? "☀️" : "🌙";
  document.getElementById("themeLabel").textContent = t === "dark" ? "Light" : "Dark";
}

// Enter key
document.addEventListener("keydown", e => { if(e.key === "Enter") doLogin(); });
// Quick-fill demo
document.querySelector(".demo-creds").addEventListener("click", ()=>{
  document.getElementById("username").value = "demo";
  document.getElementById("password").value = "demo";
});

async function doLogin(){
  const btn = document.getElementById("loginBtn");
  const err = document.getElementById("errMsg");
  const u = document.getElementById("username").value.trim();
  const p = document.getElementById("password").value;
  if(!u || !p){ showErr("Please enter username and password."); return; }
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Signing in…';
  err.classList.remove("show");
  try{
    const r = await fetch("/login",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({username:u,password:p})});
    if(r.ok){ window.location.href = "/dashboard"; }
    else{ const d=await r.json(); showErr(d.error||"Login failed"); }
  }catch(e){ showErr("Connection error. Please try again."); }
  btn.disabled=false; btn.innerHTML="Sign In →";
}
function showErr(msg){
  const el=document.getElementById("errMsg");
  el.textContent="⚠️ "+msg; el.classList.add("show");
}
</script>
</body>
</html>
